model_name: openai/whisper-large-v3
language: uz
task: transcribe
data_dir: ~/whisper-uz-ft/data
output_dir: ~/whisper-uz-ft/outputs
logging_dir: ~/whisper-uz-ft/logs/tensorboard

train_last_encoder_blocks: 8
require_cuda: true
learning_rate: 1.0e-5
epochs: 1
per_device_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
effective_batch: 32
warmup_steps: 1000
weight_decay: 0.01
eval_steps: 500
save_steps: 500
logging_steps: 25
max_grad_norm: 1.0
scheduler: cosine
fp16: true
gradient_checkpointing: true
dataloader_num_workers: 8
feature_preprocessing_num_workers: 1
early_stopping_patience: 5
save_total_limit: 3
generation_max_length: 225
generation_num_beams: 1
max_label_length: 448
resume_from_checkpoint:
nan_loss_patience: 1
max_observed_grad_norm: 5000
unsafe_grad_norm_patience: 3
