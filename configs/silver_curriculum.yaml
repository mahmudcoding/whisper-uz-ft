model_name: openai/whisper-large-v3
language: uz
task: transcribe
data_dir: ~/whisper-uz-ft/data/gold_silver_training
output_dir: ~/whisper-uz-ft/outputs_gold_silver
logging_dir: ~/whisper-uz-ft/logs/tensorboard_gold_silver
require_cuda: true
tuning_mode: encoder_24_31_plus_decoder
train_last_encoder_blocks: 8
learning_rate: 8.0e-6
encoder_learning_rate: 1.0e-6
decoder_learning_rate: 8.0e-6
epochs: 1
per_device_batch_size: 1
per_device_eval_batch_size: 2
gradient_accumulation_steps: 32
warmup_ratio: 0.1
warmup_steps: 0
weight_decay: 0.01
eval_steps: 1000
save_steps: 1000
logging_steps: 20
max_grad_norm: 1.0
scheduler: cosine
bf16: true
fp16: false
gradient_checkpointing: true
dataloader_num_workers: 8
feature_preprocessing_num_workers: 1
early_stopping_patience: 3
metric_for_best_model: wer
greater_is_better: false
save_total_limit: 3
generation_max_length: 225
generation_num_beams: 1
max_label_length: 448
load_test_split: false
evaluate_test_after_training: false
use_weighted_sampling: true
seed: 1729
data_seed: 1729
nan_loss_patience: 1
max_observed_grad_norm: 5000
unsafe_grad_norm_patience: 3
stop_on_two_eval_wer_worsen: true
hallucination_stop_threshold: 0.1
hallucination_increase_threshold: 0.05
