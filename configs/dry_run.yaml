model_name: openai/whisper-large-v3
language: uz
task: transcribe
data_dir: ~/whisper-uz-ft/data
output_dir: ~/whisper-uz-ft/outputs/dry_run
logging_dir: ~/whisper-uz-ft/logs/tensorboard_dry_run
split_prefix: mini

train_last_encoder_blocks: 8
require_cuda: true
learning_rate: 1.0e-5
epochs: 1
per_device_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 1
effective_batch: 2
warmup_steps: 0
weight_decay: 0.01
eval_steps: 10
save_steps: 10
logging_steps: 1
max_grad_norm: 1.0
scheduler: cosine
fp16: true
gradient_checkpointing: true
dataloader_num_workers: 4
feature_preprocessing_num_workers: 1
early_stopping_patience: 5
save_total_limit: 2
generation_max_length: 225
generation_num_beams: 1
max_label_length: 448
resume_from_checkpoint:
max_steps: 10
dry_run_report: ~/whisper-uz-ft/logs/dry_run_report.txt
